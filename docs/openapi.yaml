          format: date-time
        updated_at:
          type: string
          format: date-time

    BetStoreRequest:
      type: object
      required: [pay_slip_image, bet_type, target_opentime, amount, bet_numbers]
      description: Client-writable fields only. Review/result/payout statuses are server-managed and rejected if supplied.
      properties:
        pay_slip_image:
          type: string
          format: binary
          description: Required pay slip image attachment (jpg/jpeg/png/webp; max 10MB).
        bet_type:
          type: string
          enum: ['2D', '3D']
          description: Bet type enum used by the current 2D/3D flow.
        target_opentime:
          type: string
          enum: ['11:00:00', '12:01:00', '15:00:00', '16:30:00']
          description: Target stock market open time for this bet.
        amount:
          type: integer
          minimum: 1
          description: Stake amount. Must be at least 1.
        bet_numbers:
          type: array
          uniqueItems: true
          description: Unique list of numbers for this bet.
          items:
            type: integer
            minimum: 0
            maximum: 255

    BetUpdateRequest:
      type: object
      description: Partial update payload. Send only client-writable fields that should be changed. Review/result/payout statuses are server-managed and rejected if supplied.
      properties:
        bet_type:
          type: string
          enum: ['2D', '3D']
          description: Bet type enum used by the current 2D/3D flow.
        target_opentime:
          type: string
          enum: ['11:00:00', '12:01:00', '15:00:00', '16:30:00']
          description: Target stock market open time for this bet.
        amount:
          type: integer
          minimum: 1
          description: Stake amount. Must be at least 1.
        bet_numbers:
          type: array
          uniqueItems: true
          description: Replaces existing bet numbers when provided.
          items:
            type: integer
            minimum: 0
            maximum: 255

    BetPayoutRequest:
      type: object
      required: [payout_proof_image]
      properties:
        payout_proof_image:
          type: string
          format: binary
          description: Required payout proof image attachment (jpg/jpeg/png/webp; max 10MB).
        payout_reference:
          type: string
          nullable: true
          maxLength: 255
        payout_note:
          type: string
          nullable: true
          maxLength: 2000

    BetAdminStatusUpdateRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ACCEPTED, REJECTED, REFUNDED]
          description: ACCEPTED and REJECTED are review transitions from submitted bets; REFUNDED is blocked when payout_status is PAID_OUT.

